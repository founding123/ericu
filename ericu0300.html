<!-- 페이지가 그려지기 전에 index에서 고른 테마를 미리 적용해 색 번쩍임(FOUC)을 막는다.
     index.html과 동일한 localStorage 키 'sok-index-theme'를 읽는다. -->
<script>
  (function(){
    try{
      var key = 'sok-index-theme';
      var theme = localStorage.getItem(key) || '나이테';
      if (!/^(나이테|황혼|윤슬|쪽빛|미리내)$/.test(theme)) theme = '나이테';
      document.documentElement.setAttribute('data-theme', theme);
      document.documentElement.style.colorScheme = /^(쪽빛|미리내)$/.test(theme) ? 'dark' : 'light';
    }catch(e){
      document.documentElement.setAttribute('data-theme', '나이테');
    }
  })();
</script>
